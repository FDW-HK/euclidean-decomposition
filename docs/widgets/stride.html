<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Memory Stride Visualization</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #121212; color: #e0e0e0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        
        .toolbar { 
            background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 20px; 
            display: flex; flex-wrap: wrap; gap: 25px; align-items: center; border: 1px solid #333;
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

        .viz-layout { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        
        #grid { 
            background: #000; display: grid; width: 100%; aspect-ratio: 1/1;
            max-width: 650px; border: 2px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .px { border: 0.1px solid #1a1a1a; transition: background 0.1s; }
        .px.active { background: #fff; border: none; }
        .px.stride-highlight { background: #00e676; box-shadow: 0 0 10px #00e676; z-index: 5; }

        .panel { background: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid #333; }
        .code { background: #000; padding: 12px; border-radius: 6px; color: #a6e22e; font-family: 'Fira Code', monospace; font-size: 0.85rem; margin: 15px 0; }
        
        button { padding: 10px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .run-btn { background: #00e676; color: #000; }
        .run-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        .reset-btn { background: #444; color: #fff; }
        input[type="range"] { cursor: pointer; width: 150px; }
        input[type="number"] { background: #333; border: 1px solid #444; color: #fff; padding: 6px; border-radius: 4px; width: 60px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Cloud Chamber: Dynamic Stride Control</h2>
    
    <div class="toolbar">
        <div class="control-group">
            <label>Grid Size (n)</label>
            <input type="number" id="nVal" value="48" min="4" max="128">
        </div>
        
        <div class="control-group">
            <label>Stride Speed (Delay)</label>
            <div style="display:flex; align-items:center; gap:10px;">
                <span>Fast</span>
                <input type="range" id="speed" min="0" max="500" value="50" step="10">
                <span>Slow</span>
            </div>
        </div>

        <div style="display:flex; gap:10px; padding-top:15px;">
            <button class="run-btn" id="run">Run Algorithm</button>
            <button class="reset-btn" id="reset">Reset</button>
        </div>
    </div>

    <div class="viz-layout">
        <div id="grid"></div>
        
        <div class="panel">
            <h3 style="margin-top:0; color:#00e676;">Stride Pointer</h3>
            <div style="font-size: 2.5rem; font-weight: bold;">a = <span id="valA">0</span></div>
            
            <p style="color:#888;">Current Memory Slice:</p>
            <div class="code" id="codeDisp">row[a-1 : a*n : a] = 1</div>
            
            <div style="margin-top:30px; padding-top:20px; border-top: 1px solid #333;">
                <div style="display:flex; justify-content: space-between;">
                    <span>Unique Products:</span>
                    <b id="count">0</b>
                </div>
                <div style="color: #666; font-size: 0.8rem; margin-top:10px;">
                    This visualization renders the "Multiplicative Support" by stamping multiples across the grid[cite: 218, 260].
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const gridEl = document.getElementById('grid');
    const nIn = document.getElementById('nVal');
    const speedIn = document.getElementById('speed');
    const runBtn = document.getElementById('run');
    const resetBtn = document.getElementById('reset');
    const valA = document.getElementById('valA');
    const codeDisp = document.getElementById('codeDisp');
    const countDisp = document.getElementById('count');

    let n, pixels = [], activeCount = 0, isRunning = false;

    function build() {
        n = parseInt(nIn.value);
        gridEl.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
        gridEl.innerHTML = '';
        pixels = [];
        activeCount = 0;
        countDisp.innerText = '0';
        valA.innerText = '0';
        for(let i=0; i < n*n; i++) {
            const d = document.createElement('div');
            d.className = 'px';
            gridEl.appendChild(d);
            pixels.push(d);
        }
    }

    async function execute() {
        if(isRunning) return;
        isRunning = true;
        runBtn.disabled = true;

        for(let a=1; a <= n; a++) {
            if(!isRunning) break;
            
            valA.innerText = a;
            codeDisp.innerText = `row[${a-1} : ${a*n} : ${a}] = 1`;

            const currentIndices = [];
            // row[a-1 : a*n : a] = 1 
            for(let k = a-1; k < a*n; k += a) {
                currentIndices.push(k);
                if(!pixels[k].classList.contains('active')) {
                    pixels[k].classList.add('active');
                    activeCount++;
                }
                pixels[k].classList.add('stride-highlight');
            }
            
            countDisp.innerText = activeCount;
            
            // Dynamic delay based on slider
            const delay = parseInt(speedIn.value);
            await new Promise(r => setTimeout(r, delay));
            
            currentIndices.forEach(idx => pixels[idx].classList.remove('stride-highlight'));
        }
        
        isRunning = false;
        runBtn.disabled = false;
    }

    runBtn.onclick = execute;
    resetBtn.onclick = () => { isRunning = false; setTimeout(build, 100); };
    nIn.onchange = build;
    build();
</script>
</body>
</html>
